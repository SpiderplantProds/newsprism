services:
  - type: pserv
    name: newsprism-db
    runtime: image
    repo: https://github.com/SpiderplantProds/newsprism
    image:
      image: postgres:15-alpine
    envVars:
      - key: POSTGRES_DB
        value: newsprism
      - key: POSTGRES_USER
        value: newsprism
      - key: POSTGRES_PASSWORD
        generateValue: true
    disk:
      name: data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1

  - type: web
    name: newsprism-api
    runtime: python
    repo: https://github.com/SpiderplantProds/newsprism
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromService:
          name: newsprism-db
          type: pserv
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
        
